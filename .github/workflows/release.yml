name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: master

      - name: Set release as draft until builds complete
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ steps.release.outputs.tag_name }} --draft --repo ${{ github.repository }}

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-nexa-v1-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-release-nexa-v1-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Clean stale build artifacts
        run: cargo clean
        working-directory: ${{ github.workspace }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}

      - name: Upload artifacts to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ARTIFACTS='${{ steps.tauri.outputs.artifactPaths }}'
          echo "Uploading artifacts for $TAG"
          echo "$ARTIFACTS" | tr -d '[]"' | tr ',' '\n' | while IFS= read -r artifact; do
            artifact=$(echo "$artifact" | xargs)
            if [ -n "$artifact" ] && [ -f "$artifact" ]; then
              echo "  → $(basename "$artifact")"
              gh release upload "$TAG" "$artifact" --clobber --repo "${{ github.repository }}"
            fi
          done

  publish:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ needs.release-please.outputs.tag_name }} --draft=false --repo ${{ github.repository }}

      - uses: actions/checkout@v4

      - name: Generate updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${{ needs.release-please.outputs.version }}"
          REPO="${{ github.repository }}"
          NOTES=$(gh release view "$TAG" --json body -q .body --repo "$REPO" | head -c 5000)
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Download .sig files
          mkdir -p /tmp/sigs
          gh release download "$TAG" --pattern "*.sig" --dir /tmp/sigs --repo "$REPO" || true

          # Validate sig files were downloaded
          SIG_COUNT=$(find /tmp/sigs -name '*.sig' 2>/dev/null | wc -l)
          echo "Found $SIG_COUNT .sig file(s)"
          if [ "$SIG_COUNT" -eq 0 ]; then
            echo "::warning::⚠️ WARNING: No .sig files found. Update bundles were not signed. Check that TAURI_SIGNING_PRIVATE_KEY is correctly configured."
          fi

          # Build platform entries
          PLATFORMS="{}"

          # Windows NSIS
          WIN_SIG=$(cat /tmp/sigs/*x64-setup.nsis.zip.sig 2>/dev/null || echo "")
          if [ -n "$WIN_SIG" ]; then
            WIN_URL="https://github.com/$REPO/releases/download/$TAG/Nexa_${VERSION}_x64-setup.nsis.zip"
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$WIN_SIG" --arg url "$WIN_URL" '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # Linux AppImage
          LINUX_SIG=$(cat /tmp/sigs/*amd64.AppImage.tar.gz.sig 2>/dev/null || echo "")
          if [ -n "$LINUX_SIG" ]; then
            LINUX_URL="https://github.com/$REPO/releases/download/$TAG/nexa-desktop_${VERSION}_amd64.AppImage.tar.gz"
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$LINUX_SIG" --arg url "$LINUX_URL" '. + {"linux-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # macOS
          MAC_SIG=$(cat /tmp/sigs/*.app.tar.gz.sig 2>/dev/null || echo "")
          if [ -n "$MAC_SIG" ]; then
            MAC_URL="https://github.com/$REPO/releases/download/$TAG/Nexa_aarch64.app.tar.gz"
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$MAC_SIG" --arg url "$MAC_URL" '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          fi

          # Generate latest.json
          jq -n \
            --arg version "$TAG" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' > latest.json

          # Validate platforms is not empty
          PLATFORM_COUNT=$(echo "$PLATFORMS" | jq 'keys | length')
          if [ "$PLATFORM_COUNT" -eq 0 ]; then
            echo "::warning::⚠️ WARNING: latest.json has no platform entries. Auto-update will not work."
          else
            echo "latest.json contains $PLATFORM_COUNT platform(s)"
          fi

          gh release upload "$TAG" latest.json --clobber --repo "$REPO"
