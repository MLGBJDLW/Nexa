name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: master

      - uses: actions/checkout@v5
        if: steps.release.outputs.release_created != 'true'
        with:
          fetch-depth: 0

      - name: Deduplicate release PR changelog entries
        if: steps.release.outputs.release_created != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR_BRANCH: release-please--branches--master--components--nexa-monorepo
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          PR_COUNT=$(gh pr list --state open --head "$OWNER:$RELEASE_PR_BRANCH" --json number --jq 'length')
          if [ "$PR_COUNT" = "0" ]; then
            exit 0
          fi

          git fetch origin "$RELEASE_PR_BRANCH"
          git switch --detach FETCH_HEAD
          node scripts/dedupe-release-changelog.mjs CHANGELOG.md

          if ! git diff --quiet -- CHANGELOG.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            git commit -m "chore: dedupe release changelog entries"
            git push origin HEAD:"$RELEASE_PR_BRANCH"
          fi

      - name: Ensure release stays draft until artifacts are verified
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ steps.release.outputs.tag_name }} --draft --repo ${{ github.repository }}

  preflight:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Validate release signing secrets
        env:
          HAS_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
        run: |
          if [ "$HAS_TAURI_SIGNING_PRIVATE_KEY" != "true" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required to produce signed updater bundles. The draft release will not be published."
            exit 1
          fi

  build:
    needs: [release-please, preflight]
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-nexa-v1-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-release-nexa-v1-

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Clean stale build artifacts
        run: cargo clean
        working-directory: ${{ github.workspace }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}

      - name: Upload artifacts to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ARTIFACTS='${{ steps.tauri.outputs.artifactPaths }}'
          echo "Uploading artifacts for $TAG"
          {
            printf '%s' "$ARTIFACTS" | jq -r '.[]?' 2>/dev/null || true
            find apps/desktop/src-tauri/target -type f \
              \( -name '*.sig' -o -name '*.zip' -o -name '*.msi' -o -name '*.exe' \
                 -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
                 -o -name '*.tar.gz' -o -name '*.tar.xz' \) 2>/dev/null || true
          } | sed '/^[[:space:]]*$/d' | sort -u > /tmp/artifacts.txt

          ARTIFACT_COUNT=$(wc -l < /tmp/artifacts.txt | tr -d ' ')
          echo "Found $ARTIFACT_COUNT artifact(s)"
          if [ "$ARTIFACT_COUNT" -eq 0 ]; then
            echo "::error::No Tauri bundle artifacts were found for upload."
            exit 1
          fi

          while IFS= read -r artifact; do
            if [ -f "$artifact" ]; then
              echo "  -> $(basename "$artifact")"
              gh release upload "$TAG" "$artifact" --clobber --repo "${{ github.repository }}"
            fi
          done < /tmp/artifacts.txt

  publish:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Verify release artifacts and generate updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${{ needs.release-please.outputs.version }}"
          REPO="${{ github.repository }}"
          gh release view "$TAG" --json body -q .body --repo "$REPO" > /tmp/release-notes.md
          node scripts/dedupe-release-changelog.mjs /tmp/release-notes.md
          gh release edit "$TAG" --notes-file /tmp/release-notes.md --repo "$REPO"
          NOTES=$(head -c 5000 /tmp/release-notes.md)
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "::error::❌ release-please output version is not valid semver: $VERSION"
            exit 1
          fi

          gh release view "$TAG" --json assets -q '.assets[].name' --repo "$REPO" | sort > /tmp/assets.txt
          echo "Release assets:"
          sed 's/^/  - /' /tmp/assets.txt

          require_asset() {
            local asset_name="$1"
            if ! grep -Fxq "$asset_name" /tmp/assets.txt; then
              echo "::error::Missing release asset: $asset_name"
              exit 1
            fi
          }

          # Download .sig files after all matrix builds have uploaded artifacts.
          mkdir -p /tmp/sigs
          gh release download "$TAG" --pattern "*.sig" --dir /tmp/sigs --repo "$REPO" || true

          SIG_COUNT=$(find /tmp/sigs -name '*.sig' 2>/dev/null | wc -l)
          echo "Found $SIG_COUNT .sig file(s)"
          if [ "$SIG_COUNT" -eq 0 ]; then
            echo "::error::❌ No .sig files found in release $TAG. Auto-updater requires signed bundles."
            echo "::error::可能原因：TAURI_SIGNING_PRIVATE_KEY / TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets 未配置或无效；或 build-release job 未成功产出 .sig 资产。"
            exit 1
          fi

          # Build platform entries
          PLATFORMS="{}"

          release_asset_url() {
            local asset_name="$1"
            local encoded
            encoded=$(printf '%s' "$asset_name" | jq -sRr @uri)
            printf 'https://github.com/%s/releases/download/%s/%s' "$REPO" "$TAG" "$encoded"
          }

          add_platform() {
            local platform="$1"
            local sig_pattern="$2"
            local sig_file
            local sig
            local asset_name
            local url

            sig_file=$(find /tmp/sigs -maxdepth 1 -type f -name "$sig_pattern" | sort | head -n 1)
            if [ -z "$sig_file" ]; then
              return 0
            fi

            sig=$(cat "$sig_file")
            asset_name=$(basename "$sig_file" .sig)
            require_asset "$asset_name"
            url=$(release_asset_url "$asset_name")
            echo "Adding updater platform $platform -> $asset_name"
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg platform "$platform" --arg sig "$sig" --arg url "$url" '. + {($platform): {"signature": $sig, "url": $url}}')
          }

          add_platform "windows-x86_64" "*x64-setup.nsis.zip.sig"
          add_platform "linux-x86_64" "*amd64.AppImage.tar.gz.sig"
          add_platform "darwin-aarch64" "*.app.tar.gz.sig"

          for platform in windows-x86_64 linux-x86_64 darwin-aarch64; do
            if ! echo "$PLATFORMS" | jq -e --arg platform "$platform" 'has($platform)' >/dev/null; then
              echo "::error::Missing signed updater bundle for $platform. Release remains draft."
              exit 1
            fi
          done

          # Generate latest.json only after all required platform artifacts are present.
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' > latest.json

          MIRROR_BASE="${UPDATE_MIRROR_BASE:-https://mirror.ghproxy.com}"
          MIRROR_BASE="${MIRROR_BASE%/}"
          jq --arg base "$MIRROR_BASE" \
            '.platforms |= with_entries(.value.url = ($base + "/" + .value.url))' \
            latest.json > latest-ghproxy.json

          PLATFORM_COUNT=$(echo "$PLATFORMS" | jq 'keys | length')
          if [ "$PLATFORM_COUNT" -ne 3 ]; then
            echo "::error::latest.json must contain exactly 3 updater platforms; found $PLATFORM_COUNT."
            exit 1
          fi
          echo "latest.json contains $PLATFORM_COUNT platform(s)"

          gh release upload "$TAG" latest.json latest-ghproxy.json --clobber --repo "$REPO"

      - name: Publish verified release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ needs.release-please.outputs.tag_name }} --draft=false --repo ${{ github.repository }}
