<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Monochrome N monogram for system tray (auto-tinted by OS).
       Two strokes meet at a centered node; BL and TR are the diagonal vertices. -->

  <!-- Left leg + half-diagonal down to center -->
  <path d="M 9 8 L 9 24 L 16 16"
        fill="none"
        stroke="currentColor"
        stroke-width="3.4"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Half-diagonal from center + right leg -->
  <path d="M 16 16 L 23 8 L 23 24"
        fill="none"
        stroke="currentColor"
        stroke-width="3.4"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Three nexus nodes: BL, center (largest), TR -->
  <circle cx="9"  cy="24" r="1.8" fill="currentColor"/>
  <circle cx="23" cy="8"  r="1.8" fill="currentColor"/>
  <circle cx="16" cy="16" r="2.4" fill="currentColor"/>
</svg>
