<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background: deep navy squircle with a subtle top-left highlight -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1230"/>
      <stop offset="100%" stop-color="#16214A"/>
    </linearGradient>
    <radialGradient id="bgHighlight" cx="0.28" cy="0.22" r="0.85">
      <stop offset="0%" stop-color="#2C4786" stop-opacity="0.38"/>
      <stop offset="55%" stop-color="#2C4786" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2C4786" stop-opacity="0"/>
    </radialGradient>

    <!-- Main stroke gradient: teal → sky (no purple) -->
    <linearGradient id="strokeGradA" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B0"/>
      <stop offset="55%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <linearGradient id="strokeGradB" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22D3B0"/>
      <stop offset="55%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>

    <!-- Darker underlay gradient for glass-like depth -->
    <linearGradient id="strokeBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E3A6E"/>
      <stop offset="100%" stop-color="#06223F"/>
    </linearGradient>

    <!-- White sheen gradient for 3D highlight -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Node sphere gradient -->
    <radialGradient id="nodeGrad" cx="0.38" cy="0.32" r="0.78">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#CFEFFF"/>
      <stop offset="75%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#22D3B0"/>
    </radialGradient>

    <!-- Center core: brighter & more luminous -->
    <radialGradient id="coreGrad" cx="0.4" cy="0.34" r="0.78">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="35%" stop-color="#EEF8FF"/>
      <stop offset="70%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </radialGradient>

    <!-- Center halo: lightbulb / insight glow -->
    <radialGradient id="centerHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#22D3B0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background squircle -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgHighlight)"/>

  <!-- Insight halo behind the monogram -->
  <circle cx="512" cy="512" r="280" fill="url(#centerHalo)"/>

  <!-- Nexus ripple connectors: thin hint-arcs linking the three nodes -->
  <g fill="none" stroke="#7DD3FC" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round">
    <path d="M 260 260 Q 380 400 504 508"/>
    <path d="M 520 516 Q 642 624 764 764"/>
    <path d="M 260 260 Q 512 160 764 260"/>
    <path d="M 260 764 Q 512 864 764 764"/>
  </g>

  <!-- Tiny ripple dots -->
  <g fill="#7DD3FC" opacity="0.5">
    <circle cx="390" cy="400" r="7"/>
    <circle cx="634" cy="624" r="7"/>
    <circle cx="512" cy="196" r="6"/>
    <circle cx="512" cy="828" r="6"/>
  </g>

  <!-- === N Monogram (two glowing strokes meeting at center) === -->
  <!-- Dark underlay = depth edge -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="136">
    <path d="M 260 240 L 260 784 L 512 512" stroke="url(#strokeBase)"/>
    <path d="M 512 512 L 764 240 L 764 784" stroke="url(#strokeBase)"/>
  </g>

  <!-- Main luminous strokes -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="112">
    <path d="M 260 240 L 260 784 L 512 512" stroke="url(#strokeGradA)"/>
    <path d="M 512 512 L 764 240 L 764 784" stroke="url(#strokeGradB)"/>
  </g>

  <!-- Glass sheen on vertical legs -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="30" opacity="0.6">
    <path d="M 232 288 L 232 740" stroke="url(#sheen)"/>
    <path d="M 736 288 L 736 740" stroke="url(#sheen)"/>
  </g>

  <!-- === Nexus Nodes === -->
  <!-- Vertex nodes: BL and TR (endpoints of the diagonal) -->
  <circle cx="260" cy="784" r="48" fill="url(#nodeGrad)"/>
  <circle cx="764" cy="240" r="48" fill="url(#nodeGrad)"/>
  <ellipse cx="247" cy="768" rx="14" ry="8" fill="#FFFFFF" opacity="0.8"/>
  <ellipse cx="751" cy="224" rx="14" ry="8" fill="#FFFFFF" opacity="0.8"/>

  <!-- Center node: largest, with its own soft halo (insight bulb) -->
  <circle cx="512" cy="512" r="130" fill="url(#centerHalo)"/>
  <circle cx="512" cy="512" r="70" fill="url(#coreGrad)"/>
  <ellipse cx="493" cy="491" rx="22" ry="12" fill="#FFFFFF" opacity="0.9"/>

  <!-- Small end-cap dots at TL and BR for visual balance -->
  <circle cx="260" cy="240" r="20" fill="#EEF8FF" opacity="0.92"/>
  <circle cx="764" cy="784" r="20" fill="#EEF8FF" opacity="0.92"/>
</svg>
